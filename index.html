<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>松鼠逛逛产品溯源查询（动态数据版）</title>
    <style>
        /* 保持原有样式不变 */
        body {
            font-family: "Microsoft Yahei", Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 40px;
            font-size: 22px;
        }
        .search-box {
            max-width: 820px;
            margin: 0 auto 30px;
        }
        input[type="text"] {
            width: 100%;
            padding: 30px 30px;
            font-size: 32px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
        }
        .trace-card {
            max-width: 700px;
            margin: 0 auto 30px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            padding: 60px;
            display: none;
        }
        .trace-title {
            color: #2e8b57;
            font-size: 48px;
            text-align: center;
            margin: 0 0 40px;
            font-weight: 600;
            line-height: 1.3;
        }
        .trace-item {
            font-size: 40px;
            line-height: 2.5;
            margin: 15px 0;
        }
        .trace-label {
            font-weight: bold;
            color: #333;
            display: inline-block;
            min-width: 160px;
        }
        .trace-value {
            color: #555;
        }
        .report-img-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 15px;
        }
        .report-img {
            max-width: 500px;
            height: auto;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .report-img:hover {
            transform: scale(1.03);
        }
        .no-result {
            max-width: 900px;
            margin: 0 auto;
            color: #dc3545;
            text-align: center;
            padding: 20px 20px;
            font-size: 40px;
            background: #fff;
            border-radius: 15px;
            display: none;
        }
        .img-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            touch-action: pan-y;
        }
        .modal-content {
            max-width: 95%;
            max-height: 95%;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
        }
        .close-modal {
            position: absolute;
            top: 30px;
            right: 40px;
            color: white;
            font-size: 48px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            background-color: rgba(255,255,255,0.3);
            border-radius: 50%;
            color: white;
            font-size: 36px;
            text-align: center;
            line-height: 60px;
            cursor: pointer;
            transition: background-color 0.2s;
            border: none;
            outline: none;
        }
        .modal-nav-btn:hover {
            background-color: rgba(255,255,255,0.5);
        }
        .prev-btn {
            left: 30px;
        }
        .next-btn {
            right: 30px;
        }
        .modal-page-info {
            position: absolute;
            bottom: 30px;
            color: white;
            font-size: 24px;
            background-color: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
        }
        #cardsContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="请输入商品名/编码进行搜索...">
    </div>

    <!-- 无结果提示 -->
    <div class="no-result" id="noResult">未找到匹配的商品信息</div>

    <!-- 动态卡片将插入到此容器中 -->
    <div id="cardsContainer"></div>

    <!-- 图片预览弹窗（保持不变） -->
    <div class="img-modal" id="imgModal">
        <span class="close-modal" onclick="closeImgModal()">&times;</span>
        <button class="modal-nav-btn prev-btn" onclick="changePage(-1)">&lt;</button>
        <button class="modal-nav-btn next-btn" onclick="changePage(1)">&gt;</button>
        <div class="modal-page-info" id="pageInfo">1/1</div>
        <img class="modal-content" id="modalImg" onclick="closeImgModal()">
    </div>

    <script>
        // ==================== 配置 ====================
        // 请将下面的 URL 替换为您自己托管的 products.json 的公网地址
        const JSON_URL = https://gist.githubusercontent.com/heshengyg/25517c42e84676784c45228f59f392b2/raw/7ec2865806d35f22f8b59c33921a971055cc97bd/products.json; // <-- 修改这里

        // ==================== 全局变量 ====================
        let products = [];
        const searchInput = document.getElementById('searchInput');
        const noResult = document.getElementById('noResult');
        const cardsContainer = document.getElementById('cardsContainer');
        const imgModal = document.getElementById('imgModal');
        const modalImg = document.getElementById('modalImg');
        const pageInfo = document.getElementById('pageInfo');
        let currentImgGroup = null;
        let currentIndex = 0;
        const SWIPE_THRESHOLD = 50;
        let touchStartX = 0;

        // ==================== 加载数据 ====================
        async function loadProducts() {
            try {
                const response = await fetch(JSON_URL);
                if (!response.ok) throw new Error('网络响应错误');
                products = await response.json();
                renderAllCards(products);
                handleUrlSearch(); // 根据 URL 参数自动搜索
            } catch (error) {
                console.error('加载产品数据失败：', error);
                noResult.textContent = '数据加载失败，请稍后重试';
                noResult.style.display = 'block';
            }
        }

        // ==================== 渲染所有卡片 ====================
        function renderAllCards(productsToRender) {
            cardsContainer.innerHTML = ''; // 清空容器
            productsToRender.forEach(product => {
                const card = createCard(product);
                cardsContainer.appendChild(card);
            });
        }

        // ==================== 根据产品对象创建卡片 DOM ====================
        function createCard(product) {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'trace-card';
            cardDiv.dataset.code = product.code;

            // 构建图片 HTML
            let imagesHtml = '';
            product.images.forEach((imgUrl, index) => {
                imagesHtml += `<img class="report-img" src="${imgUrl}" alt="${product.name}检测报告${index+1}" onclick="openImgModal(this.parentElement, ${index})">`;
            });

            cardDiv.innerHTML = `
                <h2 class="trace-title">${product.title}</h2>
                <div class="trace-item"><span class="trace-label">蔬菜名称：</span><span class="trace-value">${product.name}</span></div>
                <div class="trace-item"><span class="trace-label">产地：</span><span class="trace-value">${product.origin}</span></div>
                <div class="trace-item"><span class="trace-label">供应商：</span><span class="trace-value">${product.supplier}</span></div>
                <div class="trace-item"><span class="trace-label">保质期：</span><span class="trace-value">${product.shelfLife}</span></div>
                <div class="trace-item">
                    <span class="trace-label">检测报告：</span>
                    <div class="report-img-group" data-imgs='${JSON.stringify(product.images)}'>
                        ${imagesHtml}
                    </div>
                </div>
            `;
            return cardDiv;
        }

        // ==================== 解析 URL 参数 ====================
        function getUrlParam(name) {
            const params = new URL(window.location.href).searchParams;
            const value = params.get(name);
            return value ? value.trim() : '';
        }

        // ==================== 根据 URL 参数执行搜索（扫码自动填充） ====================
        function handleUrlSearch() {
            const code = getUrlParam('code');
            if (code) {
                searchInput.value = code;
                handleSearch(code);
            }
        }

        // ==================== 核心搜索函数 ====================
        function handleSearch(filter) {
            if (!filter || filter.trim() === '') {
                // 搜索框为空，显示所有卡片
                renderAllCards(products);
                noResult.style.display = 'none';
                return;
            }

            const lowerFilter = filter.toLowerCase().trim();
            const matchedProducts = products.filter(product => {
                return product.name.toLowerCase().includes(lowerFilter) ||
                       product.code.toLowerCase().includes(lowerFilter);
            });

            if (matchedProducts.length > 0) {
                renderAllCards(matchedProducts);
                noResult.style.display = 'none';
                // 如果输入的是精确编码，滚动到第一个匹配卡片
                if (matchedProducts.some(p => p.code.toLowerCase() === lowerFilter)) {
                    const firstCard = cardsContainer.querySelector('.trace-card');
                    if (firstCard) firstCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else {
                cardsContainer.innerHTML = ''; // 清空卡片
                noResult.style.display = 'block';
            }
        }

        // ==================== 图片预览相关函数（全局挂载） ====================
        window.openImgModal = function(imgGroup, index) {
            currentImgGroup = JSON.parse(imgGroup.dataset.imgs);
            currentIndex = index;
            updateModalContent();
            imgModal.style.display = 'flex';
        }

        window.closeImgModal = function() {
            imgModal.style.display = 'none';
            currentImgGroup = null;
            currentIndex = 0;
        }

        function updateModalContent() {
            if (!currentImgGroup || currentImgGroup.length === 0) return;
            modalImg.src = currentImgGroup[currentIndex];
            pageInfo.textContent = `${currentIndex + 1}/${currentImgGroup.length}`;
            document.querySelector('.prev-btn').style.display = currentImgGroup.length > 1 ? 'block' : 'none';
            document.querySelector('.next-btn').style.display = currentImgGroup.length > 1 ? 'block' : 'none';
        }

        window.changePage = function(step) {
            if (!currentImgGroup || currentImgGroup.length <= 1) return;
            currentIndex += step;
            if (currentIndex < 0) currentIndex = currentImgGroup.length - 1;
            else if (currentIndex >= currentImgGroup.length) currentIndex = 0;
            updateModalContent();
        }

        // ==================== 滑动事件监听 ====================
        modalImg.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });
        modalImg.addEventListener('mousedown', e => {
            touchStartX = e.screenX;
        });
        modalImg.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            handleSwipe(touchEndX);
        });
        modalImg.addEventListener('mouseup', e => {
            handleSwipe(e.screenX);
        });
        modalImg.addEventListener('mouseleave', e => {
            // 可选：鼠标离开时不触发翻页
        });

        function handleSwipe(touchEndX) {
            const swipeDiff = touchStartX - touchEndX;
            if (swipeDiff > SWIPE_THRESHOLD) {
                changePage(1);
            } else if (swipeDiff < -SWIPE_THRESHOLD) {
                changePage(-1);
            }
        }

        // ==================== 点击模态框背景关闭 ====================
        imgModal.addEventListener('click', e => {
            if (e.target === imgModal) closeImgModal();
        });

        // ==================== 监听输入事件 ====================
        searchInput.addEventListener('input', function() {
            handleSearch(this.value.trim());
        });

        // ==================== 启动加载 ====================
        loadProducts();
    </script>
</body>
</html>
