<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>松鼠逛逛产品溯源查询</title>
    <style>
        body {
            font-family: "Microsoft Yahei", Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 40px;
            font-size: 22px;
        }
        .search-box {
            max-width: 820px;
            margin: 0 auto 30px;
        }
        input[type="text"] {
            width: 100%;
            padding: 30px 30px;
            font-size: 32px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
        }
        .trace-card {
            max-width: 700px;
            margin: 0 auto;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            padding: 60px;
            display: none;
        }
        .trace-title {
            color: #2e8b57;
            font-size: 48px;
            text-align: center;
            margin: 0 0 40px;
            font-weight: 600;
            line-height: 1.3;
        }
        .trace-item {
            font-size: 40px;
            line-height: 2.5;
            margin: 15px 0;
        }
        .trace-label {
            font-weight: bold;
            color: #333;
            display: inline-block;
            min-width: 160px;
        }
        .trace-value {
            color: #555;
        }
        .report-img-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 15px;
        }
        .report-img {
            max-width: 500px;
            height: auto;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .report-img:hover {
            transform: scale(1.03);
        }
        .no-result {
            max-width: 900px;
            margin: 0 auto;
            color: #dc3545;
            text-align: center;
            padding: 20px 20px;
            font-size: 40px;
            background: #fff;
            border-radius: 15px;
            display: none;
        }
        .img-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }
        .modal-content {
            max-width: 95%;
            max-height: 95%;
            border-radius: 10px;
            user-select: none;
        }
        .close-modal {
            position: absolute;
            top: 30px;
            right: 40px;
            color: white;
            font-size: 48px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
        }
        .modal-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            background-color: rgba(255,255,255,0.3);
            border-radius: 50%;
            color: white;
            font-size: 36px;
            text-align: center;
            line-height: 60px;
            cursor: pointer;
            transition: background-color 0.2s;
            border: none;
            outline: none;
            z-index: 10000;
        }
        .modal-nav-btn:hover {
            background-color: rgba(255,255,255,0.5);
        }
        .prev-btn {
            left: 30px;
        }
        .next-btn {
            right: 30px;
        }
        .modal-page-info {
            position: absolute;
            bottom: 30px;
            color: white;
            font-size: 24px;
            background-color: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            z-index: 10000;
        }
        /* 加载提示样式 */
        .loading {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
            padding: 40px;
            font-size: 40px;
            color: #2e8b57;
            display: block;
        }
    </style>
</head>
<body>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="请输入商品名/编码进行搜索...">
    </div>

    <!-- 无结果提示 -->
    <div class="no-result" id="noResult">未找到匹配的商品信息</div>
    
    <!-- 加载提示 -->
    <div class="loading" id="loading">正在加载产品数据...</div>

    <!-- 产品卡片容器（动态生成卡片） -->
    <div id="productCardsContainer"></div>

    <!-- 图片预览弹窗 -->
    <div class="img-modal" id="imgModal">
        <span class="close-modal" onclick="closeImgModal()">&times;</span>
        <button class="modal-nav-btn prev-btn" onclick="changePage(-1)">&lt;</button>
        <button class="modal-nav-btn next-btn" onclick="changePage(1)">&gt;</button>
        <div class="modal-page-info" id="pageInfo">1/1</div>
        <img class="modal-content" id="modalImg">
    </div>

    <script>
        // ========== 核心配置 ==========
        // 替换为你实际的JSON文件公网地址
        const PRODUCTS_DATA_URL = https://gist.githubusercontent.com/heshengyg/25517c42e84676784c45228f59f392b2/raw/7ec2865806d35f22f8b59c33921a971055cc97bd/products.json;
        
        // ========== 全局变量 ==========
        const searchInput = document.getElementById('searchInput');
        const noResult = document.getElementById('noResult');
        const loading = document.getElementById('loading');
        const productCardsContainer = document.getElementById('productCardsContainer');
        const imgModal = document.getElementById('imgModal');
        const modalImg = document.getElementById('modalImg');
        const pageInfo = document.getElementById('pageInfo');
        
        let products = []; // 存储加载的产品数据
        let currentImgGroup = null;
        let currentIndex = 0;
        let touchStartX = 0;
        let touchEndX = 0;
        const SWIPE_THRESHOLD = 50;

        // ========== 初始化 ==========
        // 页面加载时获取产品数据
        window.addEventListener('load', async function() {
            try {
                // 加载产品数据
                await loadProductsData();
                // 解析URL参数（扫码场景）
                const code = getUrlParam('code');
                if (code) {
                    searchInput.value = code;
                    handleSearch(code);
                }
            } catch (error) {
                loading.textContent = "数据加载失败，请刷新页面重试";
                loading.style.color = "#dc3545";
                console.error("加载产品数据失败：", error);
            }
        });

        // ========== 数据加载与渲染 ==========
        // 从公网加载产品JSON数据
        async function loadProductsData() {
            const response = await fetch(PRODUCTS_DATA_URL, {
                cache: 'no-cache', // 禁用缓存，确保获取最新数据
                headers: {
                    'Content-Type': 'application/json'
                }
            });
            
            if (!response.ok) {
                throw new Error(`请求失败：${response.status}`);
            }
            
            const data = await response.json();
            products = data.products || [];
            
            // 渲染所有产品卡片
            renderProductCards();
            
            // 隐藏加载提示
            loading.style.display = 'none';
        }

        // 动态渲染产品卡片
        function renderProductCards() {
            productCardsContainer.innerHTML = ''; // 清空容器
            
            products.forEach(product => {
                // 创建卡片元素
                const card = document.createElement('div');
                card.className = 'trace-card';
                card.dataset.code = product.code;
                
                // 构建检测报告图片组HTML
                let reportImagesHtml = '';
                product.reportImages.forEach((imgUrl, index) => {
                    const altText = `${product.name}检测报告${index + 1}`;
                    reportImagesHtml += `
                        <img class="report-img" 
                             src="${imgUrl}" 
                             alt="${altText}" 
                             onclick="openImgModal(['${product.reportImages.join("','")}'], ${index})">
                    `;
                });
                
                // 卡片内容
                card.innerHTML = `
                    <h2 class="trace-title">${product.title}</h2>
                    <div class="trace-item"><span class="trace-label">蔬菜名称：</span><span class="trace-value">${product.name}</span></div>
                    <div class="trace-item"><span class="trace-label">产地：</span><span class="trace-value">${product.origin}</span></div>
                    <div class="trace-item"><span class="trace-label">供应商：</span><span class="trace-value">${product.supplier}</span></div>
                    <div class="trace-item">
                        <span class="trace-label">保质期：</span><span class="trace-value">${product.shelfLife}</span>
                    </div>
                    <div class="trace-item">
                        <span class="trace-label">检测报告：</span>
                        <div class="report-img-group">
                            ${reportImagesHtml}
                        </div>
                    </div>
                `;
                
                // 添加到容器
                productCardsContainer.appendChild(card);
            });
        }

        // ========== 搜索功能 ==========
        // 解析URL参数
        function getUrlParam(name) {
            const params = new URL(window.location.href).searchParams;
            const value = params.get(name);
            return value ? value.trim() : '';
        }

        // 初始化页面（隐藏所有卡片）
        function initPage() {
            const traceCards = document.querySelectorAll('.trace-card');
            traceCards.forEach(card => card.style.display = 'none');
            noResult.style.display = 'none';
        }

        // 核心搜索函数
        function handleSearch(filter) {
            initPage();
            if (!filter || filter.trim() === '') return;

            let hasMatch = false;
            const lowerFilter = filter.toLowerCase().trim();
            const traceCards = document.querySelectorAll('.trace-card');

            traceCards.forEach((card, index) => {
                const product = products[index];
                const productName = product.name.toLowerCase();
                const productCode = product.code.toLowerCase();

                if (productName.includes(lowerFilter) || productCode.includes(lowerFilter)) {
                    hasMatch = true;
                    card.style.display = 'block';
                    if (filter.trim() === product.code) {
                        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            });

            noResult.style.display = hasMatch ? 'none' : 'block';
        }

        // 手动搜索事件
        searchInput.addEventListener('input', function() {
            handleSearch(this.value.trim());
        });

        // ========== 图片预览功能 ==========
        // 打开图片预览
        function openImgModal(imgGroup, index) {
            currentImgGroup = Array.isArray(imgGroup) ? imgGroup : [imgGroup];
            currentIndex = index;
            
            // 预加载图片（兼容微信）
            const imgUrl = currentImgGroup[currentIndex];
            const tempImg = new Image();
            tempImg.onload = function() {
                modalImg.src = imgUrl;
                updateModalContent();
                imgModal.style.display = 'flex';
            };
            tempImg.onerror = function() {
                modalImg.src = imgUrl;
                updateModalContent();
                imgModal.style.display = 'flex';
            };
            tempImg.src = imgUrl + '?t=' + new Date().getTime();
        }

        // 关闭图片预览
        function closeImgModal() {
            imgModal.style.display = 'none';
            currentImgGroup = null;
            currentIndex = 0;
        }

        // 更新弹窗内容
        function updateModalContent() {
            if (!currentImgGroup || currentImgGroup.length === 0) return;
            
            // 强制刷新图片（解决微信缓存）
            modalImg.src = currentImgGroup[currentIndex] + '?t=' + new Date().getTime();
            pageInfo.textContent = `${currentIndex + 1}/${currentImgGroup.length}`;
            
            // 单图时隐藏翻页按钮
            document.querySelector('.prev-btn').style.display = currentImgGroup.length > 1 ? 'block' : 'none';
            document.querySelector('.next-btn').style.display = currentImgGroup.length > 1 ? 'block' : 'none';
        }

        // 翻页功能
        function changePage(step) {
            if (!currentImgGroup || currentImgGroup.length <= 1) return;
            
            currentIndex += step;
            // 循环翻页逻辑
            if (currentIndex < 0) {
                currentIndex = currentImgGroup.length - 1;
            } else if (currentIndex >= currentImgGroup.length) {
                currentIndex = 0;
            }
            
            updateModalContent();
        }

        // ========== 滑动事件处理 ==========
        // 触摸开始事件
        function handleTouchStart(e) {
            e.preventDefault();
            touchStartX = e.changedTouches[0].screenX;
        }

        // 鼠标按下事件（兼容PC端）
        function handleMouseDown(e) {
            e.preventDefault();
            touchStartX = e.screenX;
        }

        // 触摸结束事件
        function handleTouchEnd(e) {
            e.preventDefault();
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }

        // 鼠标松开事件（兼容PC端）
        function handleMouseUp(e) {
            e.preventDefault();
            touchEndX = e.screenX;
            handleSwipe();
        }

        // 处理滑动逻辑
        function handleSwipe() {
            const swipeDiff = touchStartX - touchEndX;
            // 左滑→下一页
            if (swipeDiff > SWIPE_THRESHOLD) {
                changePage(1);
            }
            // 右滑→上一页
            else if (swipeDiff < -SWIPE_THRESHOLD) {
                changePage(-1);
            }
        }

        // 绑定滑动事件
        modalImg.addEventListener('touchstart', handleTouchStart, { passive: false });
        modalImg.addEventListener('mousedown', handleMouseDown, { passive: false });
        modalImg.addEventListener('touchend', handleTouchEnd, { passive: false });
        modalImg.addEventListener('mouseup', handleMouseUp, { passive: false });
        modalImg.addEventListener('mouseleave', handleMouseUp, { passive: false });

        // 点击弹窗空白处关闭
        imgModal.addEventListener('click', e => {
            if (e.target === imgModal) closeImgModal();
        });

        // ========== 微信兼容处理 ==========
        if (/(MicroMessenger)/i.test(navigator.userAgent)) {
            document.addEventListener('WeixinJSBridgeReady', function() {}, false);
        }
    </script>
</body>
</html>
