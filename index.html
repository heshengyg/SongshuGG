        <input type="text" id="searchInput" placeholder="请输入商品名/编码进行搜索...">

    <!-- 无结果提示 -->
    <div class="no-result" id="noResult">未找到匹配的商品信息</div>

    <!-- 动态卡片将插入到此容器中 -->
    <div id="cardsContainer"></div>

    <!-- 图片预览弹窗（保持不变） -->

    </div>

    <script>
 // 产品数据存储
let products = [];
// 获取 DOM 元素
const searchInput = document.getElementById('searchInput');
const noResult = document.getElementById('noResult');
const cardsContainer = document.getElementById('cardsContainer');
const imgModal = document.getElementById('imgModal');
const modalImg = document.getElementById('modalImg');
const pageInfo = document.getElementById('pageInfo');
let currentImgGroup = null;
let currentIndex = 0;
const SWIPE_THRESHOLD = 50;

// JSON 文件地址（请替换为您的实际地址）
const JSON_URL = https://gist.githubusercontent.com/heshengyg/653656067078e17ffbd349a1d008ed7e/raw/7b3c16f76353b283e4cad48904cef3ee6af94970/products.json;

// 初始化：加载 JSON 数据
async function loadProducts() {
    try {
        const response = await fetch(JSON_URL);
        if (!response.ok) throw new Error('网络响应错误');
        products = await response.json();
        renderAllCards(products);
        handleUrlSearch(); // 根据 URL 参数自动搜索
    } catch (error) {
        console.error('加载产品数据失败：', error);
        noResult.textContent = '数据加载失败，请稍后重试';
        noResult.style.display = 'block';
    }
}

// 渲染所有卡片（默认全部显示）
function renderAllCards(productsToRender) {
    cardsContainer.innerHTML = ''; // 清空容器
    productsToRender.forEach(product => {
        const card = createCard(product);
        cardsContainer.appendChild(card);
    });
}

// 根据产品对象创建卡片 DOM 元素
function createCard(product) {
    const cardDiv = document.createElement('div');
    cardDiv.className = 'trace-card';
    cardDiv.dataset.code = product.code;

    // 构建卡片内部 HTML
    let imagesHtml = '';
    product.images.forEach((imgUrl, index) => {
        imagesHtml += `<img class="report-img" src="${imgUrl}" alt="${product.name}检测报告${index+1}" onclick="openImgModal(this.parentElement, ${index})">`;
    });

    cardDiv.innerHTML = `
        <h2 class="trace-title">${product.title}</h2>
        <div class="trace-item"><span class="trace-label">蔬菜名称：</span><span class="trace-value">${product.name}</span></div>
        <div class="trace-item"><span class="trace-label">产地：</span><span class="trace-value">${product.origin}</span></div>
        <div class="trace-item"><span class="trace-label">供应商：</span><span class="trace-value">${product.supplier}</span></div>
        <div class="trace-item"><span class="trace-label">保质期：</span><span class="trace-value">${product.shelfLife}</span></div>
        <div class="trace-item">
            <span class="trace-label">检测报告：</span>
            <div class="report-img-group" data-imgs='${JSON.stringify(product.images)}'>
                ${imagesHtml}
            </div>
        </div>
    `;
    return cardDiv;
}

// 解析 URL 参数
function getUrlParam(name) {
    const params = new URL(window.location.href).searchParams;
    const value = params.get(name);
    return value ? value.trim() : '';
}

// 根据 URL 参数执行搜索（扫码自动填充）
function handleUrlSearch() {
    const code = getUrlParam('code');
    if (code) {
        searchInput.value = code;
        handleSearch(code);
    }
}

// 核心搜索函数
function handleSearch(filter) {
    if (!filter || filter.trim() === '') {
        // 如果搜索框为空，显示所有卡片
        renderAllCards(products);
        noResult.style.display = 'none';
        return;
    }

    const lowerFilter = filter.toLowerCase().trim();
    const matchedProducts = products.filter(product => {
        return product.name.toLowerCase().includes(lowerFilter) ||
               product.code.toLowerCase().includes(lowerFilter);
    });

    if (matchedProducts.length > 0) {
        renderAllCards(matchedProducts);
        noResult.style.display = 'none';
        // 如果输入的是精确编码，滚动到第一个匹配卡片
        if (matchedProducts.some(p => p.code.toLowerCase() === lowerFilter)) {
            const firstCard = cardsContainer.querySelector('.trace-card');
            if (firstCard) firstCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    } else {
        cardsContainer.innerHTML = ''; // 清空卡片
        noResult.style.display = 'block';
    }
}

// 监听输入事件
searchInput.addEventListener('input', function() {
    handleSearch(this.value.trim());
});

// 图片预览相关函数（保持不变，但注意 openImgModal 需在全局可用）
function openImgModal(imgGroup, index) {
    currentImgGroup = JSON.parse(imgGroup.dataset.imgs);
    currentIndex = index;
    updateModalContent();
    imgModal.style.display = 'flex';
}

function closeImgModal() {
    imgModal.style.display = 'none';
    currentImgGroup = null;
    currentIndex = 0;
}

function updateModalContent() {
    if (!currentImgGroup || currentImgGroup.length === 0) return;
    modalImg.src = currentImgGroup[currentIndex];
    pageInfo.textContent = `${currentIndex + 1}/${currentImgGroup.length}`;
    document.querySelector('.prev-btn').style.display = currentImgGroup.length > 1 ? 'block' : 'none';
    document.querySelector('.next-btn').style.display = currentImgGroup.length > 1 ? 'block' : 'none';
}

function changePage(step) {
    if (!currentImgGroup || currentImgGroup.length <= 1) return;
    currentIndex += step;
    if (currentIndex < 0) currentIndex = currentImgGroup.length - 1;
    else if (currentIndex >= currentImgGroup.length) currentIndex = 0;
    updateModalContent();
}

// 滑动事件监听（保持原有）
modalImg.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
modalImg.addEventListener('mousedown', e => touchStartX = e.screenX);
modalImg.addEventListener('touchend', e => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
});
modalImg.addEventListener('mouseup', e => {
    touchEndX = e.screenX;
    handleSwipe();
});
modalImg.addEventListener('mouseleave', e => {
    // 如果鼠标离开图片区域，不触发翻页（可选）
});

function handleSwipe() {
    const swipeDiff = touchStartX - touchEndX;
    if (swipeDiff > SWIPE_THRESHOLD) changePage(1);
    else if (swipeDiff < -SWIPE_THRESHOLD) changePage(-1);
}

// 点击模态框背景关闭
imgModal.addEventListener('click', e => {
    if (e.target === imgModal) closeImgModal();
});

// 开始加载数据
loadProducts();

// 为了使 openImgModal 在 onclick 中可用，将其挂载到 window 对象
window.openImgModal = openImgModal;
window.closeImgModal = closeImgModal;
window.changePage = changePage;
    </script>
